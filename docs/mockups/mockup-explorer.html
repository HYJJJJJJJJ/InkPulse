let st={size:0, layout:0, bwr:true};

function quantize(ctx,w,h,bwr){
  const im=ctx.getImageData(0,0,w,h), d=im.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2]; let R=255,G=255,B=255;
    const isRed=(r-g>55 && r-b>55 && r>100);
    if(bwr && isRed){R=196;G=18;B=48;}
    else{const L=0.299*r+0.587*g+0.114*b; if(L<150){R=G=B=0;}}
    d[i]=R;d[i+1]=G;d[i+2]=B;d[i+3]=255;
  }
  ctx.putImageData(im,0,0);
}

// 缩放助手: 以 baseW×baseH 逻辑坐标作画, 自动映射到真实 w×h
function mkG(ctx,baseW,baseH,w,h,bwr){
  const INK='#000', RED=bwr?'#c41230':'#000';
  const sx=w/baseW, sy=h/baseH, sf=Math.min(sx,sy);
  const X=x=>x*sx, Y=y=>y*sy, F=s=>Math.max(7,s*sf);
  const g={INK,RED,bwr,w,h};
  g.T=(x,y,s,txt,o={})=>{ctx.font=`${o.w||'400'} ${F(s)}px ${FONTS}`;ctx.fillStyle=o.c||INK;ctx.textAlign=o.align||'left';
    const px=X(x),py=Y(y);ctx.fillText(txt,px,py);
    if(o.strike){const wpx=ctx.measureText(txt).width;let s0=px;if(o.align==='right')s0=px-wpx;else if(o.align==='center')s0=px-wpx/2;
      ctx.fillStyle=o.c||INK;ctx.fillRect(s0,py+F(s)*0.55,wpx,Math.max(1,F(s)/16));}};
  g.line=(x,y,wd,ht)=>{ctx.fillStyle=INK;ctx.fillRect(X(x),Y(y),Math.max(1,wd*sx),Math.max(1,ht*sy));};
  g.fill=(x,y,wd,ht,col)=>{ctx.fillStyle=col;ctx.fillRect(X(x),Y(y),wd*sx,ht*sy);};
  g.box=(x,y,s,on)=>{const S=F(s),px=X(x),py=Y(y);ctx.fillStyle=INK;
    ctx.fillRect(px,py,S,2);ctx.fillRect(px,py+S-2,S,2);ctx.fillRect(px,py,2,S);ctx.fillRect(px+S-2,py,2,S);if(on)ctx.fillRect(px+3,py+3,S-6,S-6);};
  g.bar=(x,y,wd,ht,r,col)=>{const px=X(x),py=Y(y),WD=wd*sx,HT=Math.max(8,ht*sf);ctx.fillStyle=INK;
    ctx.fillRect(px,py,WD,2);ctx.fillRect(px,py+HT-2,WD,2);ctx.fillRect(px,py,2,HT);ctx.fillRect(px+WD-2,py,2,HT);
    ctx.fillStyle=col;ctx.fillRect(px+2,py+2,(WD-4)*r,HT-4);};
  g.status=(x,y,s)=>{ctx.textAlign='left';
    if(bwr){g.T(x,y,s,'● 等你输入',{w:'800',c:RED});}
    else{ctx.font=`800 ${F(s)}px ${FONTS}`;const m=ctx.measureText('等你输入').width,p=F(8);
      ctx.fillStyle=INK;ctx.fillRect(X(x),Y(y),m+p*2,F(s)+p);ctx.fillStyle='#fff';ctx.fillText('等你输入',X(x)+p,Y(y)+p/2);}};
  g.ring=(cx,cy,rad,thick,ratio,col)=>{const RX=X(cx),RY=Y(cy),RR=rad*sf;ctx.lineCap='butt';
    ctx.lineWidth=Math.max(1,2*sf);ctx.strokeStyle=INK;ctx.beginPath();ctx.arc(RX,RY,RR,0,Math.PI*2);ctx.stroke();
    ctx.lineWidth=Math.max(3,thick*sf);ctx.strokeStyle=col;ctx.beginPath();ctx.arc(RX,RY,RR,-Math.PI/2,-Math.PI/2+Math.PI*2*ratio);ctx.stroke();};
  g.cal=(x,y,cw,ch)=>{const wd=['日','一','二','三','四','五','六'];
    for(let i=0;i<7;i++)g.T(x+i*cw+cw/2,y,13,wd[i],{align:'center',c:(i===0||i===6)?RED:INK});
    let day=1; for(let row=0;row<6&&day<=30;row++)for(let col=0;col<7;col++){
      const cell=row*7+col; if(cell<1||day>30)continue; const ccx=x+col*cw, ccy=y+22+row*ch;
      if(day===12){ctx.fillStyle=RED;ctx.fillRect(X(ccx)+2,Y(ccy)-1,cw*sx-4,ch*sy-2);g.T(ccx+cw/2,ccy+2,15,'12',{align:'center',c:'#fff',w:'700'});}
      else g.T(ccx+cw/2,ccy+2,15,String(day),{align:'center'}); day++;}};
  g.photo=()=>{const bay=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
    for(let j=0;j<h;j++)for(let i=0;i<w;i++){
      const hl=h*0.64+Math.sin(i/(55*sx))*20*sy+Math.sin(i/(13*sx))*5*sy; let black;
      if(j>hl)black=true; else{const v=0.12+(j/h)*0.5; black=v>(bay[j&3][i&3]+0.5)/16;}
      ctx.fillStyle=black?'#000':'#fff';ctx.fillRect(i,j,1,1);}
    ctx.fillStyle='#c41230';ctx.beginPath();ctx.arc(w*0.72,h*0.30,46*sf,0,Math.PI*2);ctx.fill();};
  return g;
}

    g.T(12,148,12,'今日用量'); g.T(12,168,24,'1.24M tok',{w:'800'}); g.T(12,202,13,'≈ $8.40'); g.bar(12,224,216,14,0.68,RED);
    g.line(0,250,240,2); g.T(12,258,12,'六月 · 万年历'); g.cal(8,282,33,20);
  }
}

function render(){
  const sz=SIZES[st.size], ly=LAYOUTS[st.layout];
  const c=document.createElement('canvas'); c.width=sz.w; c.height=sz.h;
  const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,sz.w,sz.h); ctx.textBaseline='top';
  if(sz.portrait){ const g=mkG(ctx,240,416,sz.w,sz.h,st.bwr); drawPortrait(ly.key,g); }
  else{ const g=mkG(ctx,800,480,sz.w,sz.h,st.bwr); drawLandscape(ly.key,g); }
  quantize(ctx,sz.w,sz.h,st.bwr);
  c.style.width=(sz.w*sz.zoom)+'px'; c.style.height=(sz.h*sz.zoom)+'px';

  const frame=document.getElementById('frame'); frame.innerHTML=''; frame.appendChild(c);
  document.getElementById('cap').textContent=`${sz.label} · ${st.bwr?'黑白红':'黑白'} · ${ly.name}`;
  const rf = sz.portrait ? ' <span class="rf">（竖屏已纵向重排）</span>' : '';
  document.getElementById('note').innerHTML=`<b>${ly.name}</b> —— ${ly.desc} <span class="uc">适用：${ly.uc}</span>${rf}<br><span class="uc">${sz.label}：${sz.hint}</span>`;

  document.querySelectorAll('#sizes .btn').forEach((b,i)=>b.classList.toggle('active',i===st.size));
  document.querySelectorAll('#layouts .btn').forEach((b,i)=>b.classList.toggle('active',i===st.layout));
  document.querySelectorAll('#color .btn').forEach((b,i)=>b.classList.toggle('active',(i===1)===st.bwr));
}

// 构建按钮
const sizesEl=document.getElementById('sizes');
SIZES.forEach((s,i)=>{const b=document.createElement('div');b.className='btn';
  b.innerHTML=`<span class="b1">${s.label.split(' ')[0]}</span><span class="b2">${s.w}×${s.h}</span>`;
  b.onclick=()=>{st.size=i;render();}; sizesEl.appendChild(b);});
const layoutsEl=document.getElementById('layouts');
LAYOUTS.forEach((l,i)=>{const b=document.createElement('div');b.className='btn';
  b.innerHTML=`<span class="b1">${l.b1}</span><span class="b2">${l.b2}</span>`;
  b.onclick=()=>{st.layout=i;render();}; layoutsEl.appendChild(b);});
const colorEl=document.getElementById('color');
['黑白','黑白红'].forEach((t,i)=>{const b=document.createElement('div');b.className='btn bwtog';
  b.innerHTML=`<span class="b1">${t}</span>`; b.onclick=()=>{st.bwr=(i===1);render();}; colorEl.appendChild(b);});

const LKEYS=['q','w','e','r','t','y'];
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k>='1'&&k<='3'){st.size=+k-1;render();}
  else if(k==='arrowdown'){st.size=(st.size+1)%3;render();}
  else if(k==='arrowup'){st.size=(st.size+2)%3;render();}
  else if(k==='arrowright'){st.layout=(st.layout+1)%6;render();}
  else if(k==='arrowleft'){st.layout=(st.layout+5)%6;render();}
  else if(LKEYS.includes(k)){st.layout=LKEYS.indexOf(k);render();}
  else if(k==='c'){st.bwr=!st.bwr;render();}
});

render();
</script>
