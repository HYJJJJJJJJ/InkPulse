<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>InkPulse 配置</title>
<style>
  body{font-family:-apple-system,"Segoe UI",sans-serif;margin:0;background:#f4f4f5;color:#18181b}
  header{background:#18181b;color:#fff;padding:12px 16px;font-size:18px;font-weight:600}
  .wrap{max-width:880px;margin:0 auto;padding:16px}
  .card{background:#fff;border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  h2{font-size:15px;margin:0 0 12px;color:#52525b}
  .layouts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .layouts label{display:block;border:2px solid #e4e4e7;border-radius:8px;padding:10px;cursor:pointer;text-align:center}
  .layouts label.sel{border-color:#dc2626;background:#fef2f2}
  .layouts input{display:none}
  .row{display:flex;align-items:center;gap:10px;margin:8px 0}
  .row label{width:130px;font-size:14px;color:#52525b}
  .row input{flex:1;padding:6px 8px;border:1px solid #d4d4d8;border-radius:6px}
  button{background:#dc2626;color:#fff;border:0;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:14px}
  button.ghost{background:#e4e4e7;color:#18181b}
  #preview{width:100%;max-width:800px;border:1px solid #d4d4d8;border-radius:6px;display:block}
  .photos{display:flex;flex-wrap:wrap;gap:8px}
  .photo{position:relative;width:120px}
  .photo img{width:120px;height:72px;object-fit:cover;border-radius:6px;border:1px solid #d4d4d8}
  .photo button{position:absolute;top:2px;right:2px;padding:2px 6px;font-size:12px}
  .hint{font-size:12px;color:#a1a1aa;margin-top:4px}
</style>
</head>
<body>
<header>InkPulse 配置中心</header>
<div class="wrap">

  <div class="card">
    <h2>布局</h2>
    <div class="layouts" id="layouts"></div>
  </div>

  <div class="card">
    <h2>布局编辑器
      <span style="float:right">
        <select id="edLayout" onchange="edPick(this.value)" style="padding:4px 8px;border-radius:6px"></select>
        <button class="ghost" style="padding:4px 10px" onclick="edNew()">新建</button>
        <button class="ghost" style="padding:4px 10px" onclick="edDelete()">删除</button>
      </span>
    </h2>
    <div id="edGrid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px;background:#111;border:2px solid #111;aspect-ratio:5/3"></div>
    <div class="row" style="margin-top:10px">
      <label>选中区域</label>
      <select id="edWidget" style="flex:1;padding:6px 8px;border:1px solid #d4d4d8;border-radius:6px"></select>
      <button onclick="edPlace()">放入</button>
    </div>
    <div id="edParams"></div>
    <div class="hint">点格子起点、再点终点框出矩形 → 选 widget(+填参数)→"放入"。点已放置的 widget 可删除。改完点"保存布局"。内置布局只读,改动会提示另存为新布局。</div>
    <button onclick="edSave()" style="margin-top:8px">保存布局</button>
  </div>

  <div class="card">
    <h2>实时预览
      <span style="float:right">
        <button class="ghost" style="padding:4px 12px" onclick="refreshPreview()">刷新预览</button>
        <button style="padding:4px 12px" onclick="refreshScreen(this)">刷新屏幕</button>
      </span>
    </h2>
    <img id="preview" src="/preview.png" alt="preview">
    <div class="hint">"刷新预览"=刷新这张网页图；"刷新屏幕"=请求真机立即刷新(设备约 10s 内上屏)。</div>
  </div>

  <div class="card">
    <h2>参数</h2>
    <div class="row"><label>今日预算 (USD)</label><input id="budget" type="number" step="1" placeholder="留空=不启用"></div>
    <div class="row"><label>token 上限 (5h)</label><input id="limit" type="number" step="100000"></div>
    <div class="row"><label>刷新间隔 (秒)</label><input id="refresh" type="number" step="60"></div>
    <button onclick="saveParams()">保存参数</button>
  </div>

  <div class="card">
    <h2>照片 (photo 布局)</h2>
    <div class="photos" id="photos"></div>
    <div class="row" style="margin-top:12px">
      <input id="file" type="file" accept="image/*">
      <button class="ghost" onclick="upload()">上传</button>
    </div>
  </div>

  <div class="card">
    <h2>待办</h2>
    <div id="todos"></div>
    <div class="row" style="margin-top:12px">
      <input id="todoText" placeholder="新待办..." onkeydown="if(event.key==='Enter')addTodo()">
      <button onclick="addTodo()">添加</button>
    </div>
  </div>

</div>
<script>
const NAMES={dash:'仪表盘',photo:'相框',usage:'用量',todo:'待办',clock:'摆钟',split:'双栏'};
let cur=null;

function refreshPreview(){document.getElementById('preview').src='/preview.png?t='+Date.now();}
async function refreshScreen(btn){
  await fetch('/api/refresh',{method:'POST'});
  const old=btn.textContent;btn.textContent='已请求 ✓';btn.disabled=true;
  setTimeout(()=>{btn.textContent=old;btn.disabled=false;},3000);
  refreshPreview();
}

async function load(){
  const c=await (await fetch('/api/config')).json();
  cur=c.layout_name;
  const box=document.getElementById('layouts');box.innerHTML='';
  c.layouts.forEach(k=>{
    const sel=k===cur?' sel':'';
    box.insertAdjacentHTML('beforeend',
      `<label class="lay${sel}" data-k="${k}"><input type="radio" name="lay" ${sel?'checked':''}>${NAMES[k]||k}<br><small>${k}</small></label>`);
  });
  box.querySelectorAll('label').forEach(l=>l.onclick=()=>setLayout(l.dataset.k));
  document.getElementById('budget').value=c.usage_budget_usd??'';
  document.getElementById('limit').value=c.usage_window_token_limit??'';
  document.getElementById('refresh').value=c.refresh_periodic_s??'';
  loadPhotos();
  loadTodos();
}

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
async function loadTodos(){
  const list=await (await fetch('/api/todos')).json();
  const box=document.getElementById('todos');box.innerHTML='';
  list.forEach(t=>box.insertAdjacentHTML('beforeend',
    `<div class="row"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')"><span style="flex:1;${t.done?'text-decoration:line-through;color:#a1a1aa':''}">${esc(t.text)}</span><button class="ghost" onclick="delTodo('${t.id}')">×</button></div>`));
  if(!list.length)box.innerHTML='<div class="hint">还没有待办</div>';
}
async function addTodo(){
  const i=document.getElementById('todoText');const t=i.value.trim();if(!t)return;
  await fetch('/api/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});
  i.value='';loadTodos();setTimeout(refreshPreview,300);
}
async function toggleTodo(id){
  await fetch('/api/todos/'+id+'/toggle',{method:'POST'});loadTodos();setTimeout(refreshPreview,300);
}
async function delTodo(id){
  await fetch('/api/todos/'+id,{method:'DELETE'});loadTodos();setTimeout(refreshPreview,300);
}

async function post(body){
  const r=await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){alert('保存失败');return false;}
  setTimeout(refreshPreview,300);return true;
}

async function setLayout(k){
  if(await post({layout_name:k})){
    document.querySelectorAll('#layouts label').forEach(l=>l.classList.toggle('sel',l.dataset.k===k));
  }
}

function num(v){return v===''?null:Number(v);}
async function saveParams(){
  await post({usage_budget_usd:num(budget.value),usage_window_token_limit:num(limit.value),refresh_periodic_s:num(refresh.value)});
}

async function loadPhotos(){
  const list=await (await fetch('/api/photos')).json();
  const box=document.getElementById('photos');box.innerHTML='';
  list.forEach(n=>box.insertAdjacentHTML('beforeend',
    `<div class="photo"><img src="/photos/${encodeURIComponent(n)}" onerror="this.style.background='#eee'"><button onclick="del('${n}')">×</button></div>`));
  if(!list.length)box.innerHTML='<div class="hint">还没有照片</div>';
}
async function upload(){
  const f=document.getElementById('file').files[0];if(!f)return;
  const fd=new FormData();fd.append('file',f);
  await fetch('/api/photos',{method:'POST',body:fd});
  document.getElementById('file').value='';loadPhotos();setTimeout(refreshPreview,300);
}
async function del(n){
  await fetch('/api/photos/'+encodeURIComponent(n),{method:'DELETE'});loadPhotos();
}
// ===== 布局编辑器 =====
const GW = 8, GH = 6;        // 网格列/行
let edCat = [];              // widget 目录
let edBuiltins = new Set(); // 内置布局名集合
let edPlacements = [];       // 当前编辑的 placements
let edName = null;           // 当前编辑布局名
let edSel = null;            // 选区 {c0,r0,c1,r1}
let edAnchor = null;         // 框选起点

async function edLoad() {
  const data = await (await fetch('/api/layouts')).json();
  edCat = data.widgets;
  edBuiltins = new Set(Object.entries(data.layouts).filter(([,v]) => v.builtin).map(([k]) => k));
  const sel = document.getElementById('edLayout');
  sel.innerHTML = Object.keys(data.layouts).map(n => `<option>${esc(n)}</option>`).join('');
  const ws = document.getElementById('edWidget');
  ws.innerHTML = edCat.map(w => `<option value="${w.name}">${esc(w.label)}</option>`).join('');
  ws.onchange = edParamForm; edParamForm();
  edPick(sel.value);
}

function edPick(name) {
  edName = name;
  fetch('/api/layouts').then(r => r.json()).then(d => {
    edPlacements = JSON.parse(JSON.stringify((d.layouts[name] || {}).placements || []));
    document.getElementById('edLayout').value = name;
    edSel = null; edAnchor = null; edRender();
  });
}

function edParamForm() {
  const w = edCat.find(x => x.name === document.getElementById('edWidget').value);
  const box = document.getElementById('edParams');
  if (!w || !w.params.length) { box.innerHTML = ''; return; }
  box.innerHTML = w.params.map(p => {
    if (p.type === 'select') {
      const opts = (p.options || []).map(o =>
        `<option value="${o.value}" ${o.value === p.default ? 'selected' : ''}>${esc(o.label)}</option>`).join('');
      return `<div class="row"><label>${esc(p.label)}</label><select data-k="${p.key}" style="flex:1;padding:6px 8px;border:1px solid #d4d4d8;border-radius:6px">${opts}</select></div>`;
    }
    const t = p.type === 'date' ? 'date' : (p.type === 'number' ? 'number' : 'text');
    return `<div class="row"><label>${esc(p.label)}</label><input data-k="${p.key}" type="${t}" value="${p.default || ''}"></div>`;
  }).join('');
}

function edRender() {
  const g = document.getElementById('edGrid');
  g.innerHTML = '';
  const occ = {};
  edPlacements.forEach((p, i) => {
    for (let c = p.col; c < p.col + p.colspan; c++)
      for (let r = p.row; r < p.row + p.rowspan; r++) occ[c + ',' + r] = i;
  });
  for (let r = 0; r < GH; r++) for (let c = 0; c < GW; c++) {
    const cell = document.createElement('div');
    cell.style.cssText = 'background:#fff;min-height:26px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#3730a3;cursor:pointer;text-align:center;line-height:1.1';
    const idx = occ[c + ',' + r];
    if (idx !== undefined) {
      const w = edCat.find(x => x.name === edPlacements[idx].widget);
      cell.style.background = '#e0e7ff';
      cell.textContent = (w ? w.label : edPlacements[idx].widget);
      cell.onclick = () => { if (confirm('删除这个 widget?')) { edPlacements.splice(idx, 1); edRender(); } };
    } else {
      const inSel = edSel && c >= edSel.c0 && c <= edSel.c1 && r >= edSel.r0 && r <= edSel.r1;
      if (inSel) cell.style.background = '#fef9c3';
      cell.onclick = () => edClick(c, r);
    }
    g.appendChild(cell);
  }
}

function edClick(c, r) {
  if (!edAnchor) { edAnchor = { c, r }; edSel = { c0: c, r0: r, c1: c, r1: r }; }
  else {
    edSel = { c0: Math.min(edAnchor.c, c), r0: Math.min(edAnchor.r, r),
              c1: Math.max(edAnchor.c, c), r1: Math.max(edAnchor.r, r) };
    edAnchor = null;
  }
  edRender();
}

function edPlace() {
  if (!edSel) { alert('先在网格里框选一块区域'); return; }
  const widget = document.getElementById('edWidget').value;
  const params = {};
  document.querySelectorAll('#edParams input, #edParams select').forEach(i => params[i.dataset.k] = i.value);
  edPlacements.push({
    widget, col: edSel.c0, row: edSel.r0,
    colspan: edSel.c1 - edSel.c0 + 1, rowspan: edSel.r1 - edSel.r0 + 1, params
  });
  edSel = null; edAnchor = null; edRender();
}

async function edSave() {
  let name = edName;
  if (edBuiltins.has(name)) {
    name = prompt('内置布局只读,另存为新布局名:', name + '-我的');
    if (!name) return;
    edName = name;
  }
  const r = await fetch('/api/layouts/' + encodeURIComponent(name), {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ placements: edPlacements })
  });
  if (!r.ok) { alert('保存失败: ' + (await r.json()).error); return; }
  alert('已保存。切到该布局并"刷新屏幕"即可上屏。');
  load();
  edLoad();
  setTimeout(refreshPreview, 300);
}

async function edNew() {
  const name = prompt('新布局名'); if (!name) return;
  edName = name; edPlacements = []; edSel = null; edAnchor = null;
  const sel = document.getElementById('edLayout');
  if (![...sel.options].some(o => o.value === name))
    sel.insertAdjacentHTML('beforeend', `<option>${esc(name)}</option>`);
  sel.value = name; edRender();
}

async function edDelete() {
  if (!edName) return;
  const r = await fetch('/api/layouts/' + encodeURIComponent(edName), { method: 'DELETE' });
  if (!r.ok) { alert((await r.json()).error); return; }
  edLoad(); load();
}
load();
edLoad();
</script>
</body>
</html>
