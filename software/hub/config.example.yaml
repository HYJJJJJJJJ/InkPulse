refresh:
  min_interval_s: 60
  periodic_s: 600
sources:
  claude_logs: ~/.claude/projects
  photos_dir: ~/inkpulse/photos
  todos_store: ~/inkpulse/todos.json
layout:
  widgets: [header_clock_env, claude_status, usage, todos]
usage:
  # 5h 滚动窗口 token 估算上限(净输入+输出), 用量进度条按此算占用比例;
  # 订阅制无官方配额口径, 按你的档位手动调; 设 null 则不显示进度条(n/a)。
  window_token_limit: 2000000
  # 今日花费预算(USD); 设了且超过时, 仪表盘花费数字标红告警。
  # 默认 null = 不启用(花费数字恒黑, 仅靠大字号强调)。
  budget_usd: null
